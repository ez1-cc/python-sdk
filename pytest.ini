[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
addopts = -v --strict-markers --tb=short
markers =
    unit: Unit tests (no network calls)
    integration: Integration tests (requires API key)
    slow: Slow running tests
    encryption: Encryption/decryption tests
    network: Tests that make network calls
filterwarnings =
    ignore::DeprecationWarning
